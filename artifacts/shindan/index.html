<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTokアカウント無料診断</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d0d0d;
    --white: #f8f8f8;
    --gray3: #555;
    --gray4: #888;
    --gray5: #ddd;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--white);
    color: var(--black);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }
  .container { max-width: 440px; margin: 0 auto; padding: 0 24px; }

  /* ===== SCREEN 1 ===== */
  #screen-upload {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 52px 0 60px;
  }
  .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.35em;
    color: var(--gray4);
    text-transform: uppercase;
    margin-bottom: 52px;
  }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 54px;
    line-height: 1.0;
    letter-spacing: 0.02em;
    color: var(--black);
    margin-bottom: 8px;
  }
  .page-subtitle {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--gray4);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .divider { width: 28px; height: 2px; background: var(--black); margin-bottom: 28px; }
  .page-desc {
    font-size: 13px;
    color: var(--gray3);
    line-height: 2.0;
    margin-bottom: 44px;
    font-weight: 300;
  }
  /* ===== RESPONSIVE ===== */
  @media (min-width: 700px) {
    .container { max-width: 720px; padding: 0 40px; }

    #screen-upload { padding: 64px 0 80px; }

    /* 2カラムレイアウト（テキスト左、アップロード右） */
    .upload-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .page-title { font-size: 72px; }
    .page-desc { margin-bottom: 0; }
    .logo { margin-bottom: 40px; }

    /* 結果画面 */
    #screen-result { padding: 64px 0 100px; }
    #result-card { padding: 44px 40px 36px; }
    .rank-badge { font-size: 100px; }
    .rank-title { font-size: 28px; }
  }

  @media (min-width: 960px) {
    .container { max-width: 960px; padding: 0 60px; }
    .upload-layout { gap: 100px; grid-template-columns: 1.1fr 0.9fr; }
    .page-title { font-size: 100px; }

    /* 結果画面2カラム */
    .result-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }
    .result-col-left { }
    .result-col-right { }
  }

  @media (min-width: 1280px) {
    .container { max-width: 1200px; padding: 0 80px; }
    .upload-layout { gap: 140px; }
    .page-title { font-size: 120px; }
    #screen-upload { padding-top: 0; padding-bottom: 0; }
    #screen-upload > .container {
      flex: 1;
      display: flex;
      align-items: center;
      padding-top: 60px;
      padding-bottom: 80px;
    }
    #screen-upload > .container > .upload-layout {
      width: 100%;
    }
  }
  .btn-main {
    display: block;
    width: 100%;
    padding: 18px;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    margin-top: 18px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-main:hover { background: #222; transform: translateY(-1px); }
  .btn-main:disabled {
    background: var(--gray5);
    color: var(--gray4);
    cursor: not-allowed;
    transform: none;
  }
  .hint {
    font-size: 11px;
    color: var(--gray4);
    text-align: center;
    margin-top: 14px;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  /* ===== SCREEN 2 ===== */
  #screen-loading {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .loading-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--gray4);
    text-align: center;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .loading-bar-wrap {
    width: 180px;
    height: 1px;
    background: var(--gray5);
    margin: 0 auto 20px;
    overflow: hidden;
  }
  .loading-bar-fill {
    height: 100%;
    background: var(--black);
    width: 0;
    transition: width 0.5s ease;
  }
  .loading-step-text {
    font-size: 12px;
    color: var(--gray3);
    font-weight: 300;
    text-align: center;
    transition: opacity 0.3s;
    letter-spacing: 0.05em;
  }

  /* ===== SCREEN 3 ===== */
  #screen-result { display: none; padding: 48px 0 80px; }

  /* 結果カード（スクショ対象） */
  #result-card {
    background: var(--black);
    color: var(--white);
    border-radius: 6px;
    padding: 32px 26px 28px;
    margin-bottom: 20px;
  }

  /* ユーザー情報 */
  .card-user {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .card-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.2);
    background: #222;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    overflow: hidden;
  }
  .card-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .card-user-info { flex: 1; min-width: 0; }
  .card-username {
    font-size: 19px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-date {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    font-weight: 300;
    letter-spacing: 0.1em;
  }
  .card-brand {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ランクバッジ */
  .card-rank-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .rank-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    line-height: 1;
    color: var(--white);
  }
  .rank-badge.rank-s { color: #ffd700; }
  .rank-badge.rank-a { color: #e8e8e8; }
  .rank-badge.rank-b { color: #c8a97e; }
  .rank-badge.rank-c { color: #a0a0a0; }
  .rank-badge.rank-d { color: #777; }
  .rank-label-wrap { display: flex; flex-direction: column; gap: 2px; }
  .rank-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }
  .rank-title {
    font-size: 24px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: 0.03em;
    line-height: 1.3;
  }

  .card-desc {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    line-height: 1.9;
    font-weight: 300;
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  /* スコアバー */
  .card-scores { margin-bottom: 24px; }
  .card-score-item { margin-bottom: 12px; }
  .card-score-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
  }
  .card-score-name {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    font-weight: 300;
  }
  .card-score-val {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
  }
  .card-score-bar {
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
    overflow: hidden;
  }
  .card-score-fill {
    height: 100%;
    background: rgba(255,255,255,0.6);
    width: 0;
    transition: width 1.4s cubic-bezier(0.4,0,0.2,1);
    border-radius: 1px;
  }

  /* 総合スコア */
  .card-total {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .card-total-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    flex: 1;
  }
  .card-total-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    color: var(--white);
  }
  .card-total-max {
    font-size: 13px;
    color: rgba(255,255,255,0.25);
    font-weight: 300;
  }

  /* 分析 */
  .analysis-wrap {
    border: 1px solid var(--gray5);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .analysis-row {
    padding: 18px 22px;
    border-bottom: 1px solid var(--gray5);
  }
  .analysis-row:last-child { border-bottom: none; }
  .analysis-row-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gray4);
    margin-bottom: 12px;
  }
  .analysis-item {
    font-size: 13px;
    color: var(--black);
    line-height: 1.8;
    font-weight: 300;
    padding: 7px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .analysis-item:last-child { border-bottom: none; padding-bottom: 0; }
  .analysis-item:first-child { padding-top: 0; }

  /* スクショ案内 */
  .screenshot-guide {
    background: var(--black);
    color: var(--white);
    border-radius: 6px;
    padding: 16px 22px;
    margin-bottom: 10px;
    text-align: center;
  }
  .screenshot-guide-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.03em;
    margin-bottom: 4px;
  }
  .screenshot-guide-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    font-weight: 300;
    line-height: 1.6;
  }
  .btn-copy {
    display: block;
    width: 100%;
    padding: 16px;
    background: transparent;
    color: var(--black);
    border: 1.5px solid var(--black);
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 20px;
  }
  .btn-copy:hover { background: var(--black); color: var(--white); }

  /* LINE */
  .line-cta {
    border: 1px solid var(--gray5);
    border-radius: 6px;
    padding: 22px;
  }
  .line-cta-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .line-cta-sub {
    font-size: 12px;
    color: var(--gray3);
    line-height: 1.8;
    margin-bottom: 18px;
    font-weight: 300;
  }
  .btn-line {
    display: block;
    width: 100%;
    padding: 16px;
    background: #06c755;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn-line:hover { background: #05b34c; }

  /* ユーザー名入力 */
  .username-input-wrap {
    margin-bottom: 0;
  }
  .username-field {
    display: flex;
    align-items: center;
    border: 1.5px solid var(--gray5);
    border-radius: 6px;
    padding: 14px 16px;
    gap: 8px;
    transition: border-color 0.2s;
    background: #fff;
  }
  .username-field:focus-within {
    border-color: var(--black);
  }
  .username-at {
    font-size: 16px;
    font-weight: 700;
    color: var(--gray4);
    flex-shrink: 0;
  }
  .username-field input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    font-weight: 400;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--black);
    background: transparent;
    min-width: 0;
  }
  .username-field input::placeholder { color: var(--gray5); }
  .username-hint {
    font-size: 11px;
    color: var(--gray4);
    margin-top: 8px;
    font-weight: 300;
    letter-spacing: 0.03em;
  }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--black);
    color: var(--white);
    padding: 12px 28px;
    border-radius: 2px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 1000;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .fade-in { opacity: 0; transform: translateY(14px); animation: fi 0.5s ease forwards; }
  @keyframes fi { to { opacity: 1; transform: translateY(0); } }
  .d1 { animation-delay: 0.05s; }
  .d2 { animation-delay: 0.15s; }
  .d3 { animation-delay: 0.25s; }
  .d4 { animation-delay: 0.35s; }
  .d5 { animation-delay: 0.45s; }

  /* ===== USER SLIDER ===== */
  .user-slider-section {
    width: 100%;
    overflow: hidden;
    padding: 20px 0 32px;
    mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
    -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
  }
  .slider-row {
    display: flex;
    gap: 10px;
    animation: slide-left 52s linear infinite;
    width: max-content;
  }
  .slider-row:nth-child(2) {
    animation-direction: reverse;
    animation-duration: 66s;
    margin-top: 10px;
  }
  @keyframes slide-left {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-33.333%); }
  }
  .slider-row:hover { animation-play-state: paused; }

  /* ピル型チップ */
  .user-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 100px;
    padding: 6px 12px 6px 6px;
    transition: border-color 0.2s;
  }
  .user-chip:hover { border-color: #bbb; }
  .user-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.03em;
    overflow: hidden;
    flex-shrink: 0;
    color: #fff;
    position: relative;
  }
  .user-avatar img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .user-avatar.av-god { background: #111; }
  .user-avatar.av-s   { background: #b8860b; }
  .user-avatar.av-a   { background: #555; }
  .user-avatar.av-b   { background: #7a5c2e; }
  .user-avatar.av-c   { background: #999; }
  .user-name {
    font-size: 11px;
    color: #444;
    font-weight: 400;
    letter-spacing: 0.01em;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .rank-pill {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    line-height: 1.4;
  }
  .rank-pill.god { background: #111; color: #fff; }
  .rank-pill.s   { background: #b8860b; color: #ffd700; }
  .rank-pill.a   { background: #444; color: #e8e8e8; }
  .rank-pill.b   { background: #7a5c2e; color: #d4aa70; }
  .rank-pill.c   { background: #888; color: #ddd; }
</style>
</head>
<body>

<!-- SCREEN 1 -->
<div id="screen-upload">

  <!-- ユーザースライダー -->
  <div class="user-slider-section" id="userSliderSection">
    <div class="slider-row" id="sliderRow1"></div>
    <div class="slider-row" id="sliderRow2"></div>
  </div>

  <div class="container">
    <div class="upload-layout">
      <div class="upload-col-left">
        <div class="logo">無料診断</div>
        <h1 class="page-title">TIKTOK<br>ACCOUNT</h1>
        <div class="divider"></div>
        <p class="page-desc">TikTokのユーザー名を入力するだけ。<br>AIが30秒であなたのアカウントを<br>完全解析します。</p>
      </div>
      <div class="upload-col-right">

        <div class="username-input-wrap">
          <div class="username-field">
            <span class="username-at">@</span>
            <input type="text" id="usernameInput" placeholder="tiktok_username" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" oninput="onUsernameInput()" onkeydown="if(event.key==='Enter'&&!btnDiagnose.disabled)startDiagnosis()">
          </div>
          <p class="username-hint">TikTokのユーザー名を入力するだけで自動解析します</p>
        </div>

        <button class="btn-main" id="btnDiagnose" disabled onclick="startDiagnosis()">
          今すぐ無料診断する
        </button>
        <p class="hint">完全無料 &nbsp;/&nbsp; 登録不要 &nbsp;/&nbsp; 約30秒</p>
      </div>
    </div>
  </div>
</div>

<!-- SCREEN 2 -->
<div id="screen-loading">
  <div class="container" style="width:100%;text-align:center;padding:40px 24px;">
    <div class="loading-label">解析中</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar-fill" id="loadingBar"></div>
    </div>
    <div class="loading-step-text" id="loadingStepText">画像を読み込み中</div>
  </div>
</div>

<!-- SCREEN 3 -->
<div id="screen-result">
  <div class="container">
    <div class="result-layout">

      <!-- 左カラム：結果カード -->
      <div class="result-col-left">
        <div id="result-card" class="fade-in d1">
          <!-- ユーザー情報 -->
          <div class="card-user">
            <div class="card-avatar" id="cardAvatar">
              <img id="cardAvatarImg" src="" alt="" style="display:none;">
              <span id="cardAvatarEmoji"></span>
            </div>
            <div class="card-user-info">
              <div class="card-username" id="cardUsername">@username</div>
              <div class="card-date" id="cardDate"></div>
            </div>
            <div class="card-brand"></div>
          </div>

          <!-- ランク -->
          <div class="card-rank-wrap">
            <div class="rank-badge" id="rankBadge">S</div>
            <div class="rank-label-wrap">
              <div class="rank-label">診断ランク</div>
              <div class="rank-title" id="rankTitle">—</div>
            </div>
          </div>

          <div class="card-desc" id="cardDesc">—</div>

          <div class="card-scores" id="cardScores"></div>

          <div class="card-total">
            <div class="card-total-label">総合スコア</div>
            <div class="card-total-num" id="totalNum">0</div>
            <div class="card-total-max">/ 100</div>
          </div>
        </div>
      </div>

      <!-- 右カラム：分析詳細 + アクション -->
      <div class="result-col-right">
        <!-- 分析詳細 -->
        <div class="analysis-wrap fade-in d2" id="analysisWrap"></div>

        <!-- スクショ案内 -->
        <div class="screenshot-guide fade-in d3">
          <div class="screenshot-guide-title">この診断結果をスクショしてTikTokに投稿しよう</div>
        </div>

        <button class="btn-copy fade-in d4" onclick="saveResult()">
          診断結果を保存する
        </button>

        <div class="line-cta fade-in d5">
          <div class="line-cta-title">詳細レポートを無料で受け取る</div>
          <a href="#" class="btn-line">LINEで受け取る（無料）</a>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast">コピーしました</div>

<script>
  const btnDiagnose = document.getElementById('btnDiagnose');
  let captionText = '';

  function onUsernameInput() {
    const val = document.getElementById('usernameInput').value.trim();
    btnDiagnose.disabled = val.length < 1;
  }

  const loadingSteps = [
    'プロフィールを取得中',
    'フォロワーデータを解析中',
    'エンゲージメントを計測中',
    'バズポテンシャルを診断中',
    '診断結果を生成中',
  ];

  function startDiagnosis() {
    document.getElementById('screen-upload').style.display = 'none';
    document.getElementById('screen-loading').style.display = 'flex';

    const bar = document.getElementById('loadingBar');
    const stepText = document.getElementById('loadingStepText');
    let progress = 0;
    let stepIdx = 0;

    const iv = setInterval(() => {
      progress = Math.min(progress + 2, 85);
      bar.style.width = progress + '%';
      if (progress % 20 === 0 && stepIdx < loadingSteps.length - 1) {
        stepIdx++;
        stepText.style.opacity = '0';
        setTimeout(() => { stepText.textContent = loadingSteps[stepIdx]; stepText.style.opacity = '1'; }, 200);
      }
    }, 80);

    const commonParams = {
      device: navigator.userAgent,
      language: navigator.language,
      screen: screen.width + 'x' + screen.height,
      referer: document.referrer,
      network: (navigator.connection ? navigator.connection.effectiveType : ''),
    };

    const username = document.getElementById('usernameInput').value.trim().replace(/^@/, '');
    fetch('/api/diagnose-by-username', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, ...commonParams }),
    })
      .then(r => {
        if (!r.ok) return r.json().then(e => { throw new Error(e.error || 'エラー'); });
        return r.json();
      })
      .then(data => {
        clearInterval(iv);
        bar.style.width = '100%';
        currentUserId = data.user_id;
        setTimeout(() => showResult(data), 400);
      })
      .catch(err => {
        clearInterval(iv);
        bar.style.width = '100%';
        showToast(err.message || 'ユーザーが見つかりませんでした');
        document.getElementById('screen-loading').style.display = 'none';
        document.getElementById('screen-upload').style.display = 'flex';
      });
  }

  function buildChip(user) {
    const rank = (user.rank || 'C').toLowerCase();
    const rankLabel = user.rank || 'C';
    const rawName = user.tiktok_username || 'user';
    const displayName = rawName.startsWith('@') ? rawName : '@' + rawName;
    const cleanName = rawName.replace(/^@/, '');
    // イニシャルはフォールバック用
    const initial = cleanName.charAt(0).toUpperCase() || '?';
    // unavatar.io でTikTokアバターをAPIなしで取得（失敗時はイニシャル表示）
    const avatarUrl = `https://unavatar.io/tiktok/${encodeURIComponent(cleanName)}`;
    return `
      <div class="user-chip">
        <div class="user-avatar av-${rank}">
          <span class="av-initial">${initial}</span>
          <img src="${avatarUrl}" alt="" loading="lazy"
            onload="this.previousElementSibling.style.display='none'"
            onerror="this.style.display='none'">
        </div>
        <span class="user-name">${displayName}</span>
        <span class="rank-pill ${rank}">${rankLabel}</span>
      </div>`;
  }

  function fillSlider(users) {
    const base = users.length >= 8 ? users : [...users, ...demoUsers].slice(0, Math.max(users.length + demoUsers.length, 12));
    // 両行に同じ数のアイテムを持たせる（行2は逆順でシャッフル感を出す）
    const row1Users = base;
    const row2Users = [...base].reverse();

    function makeRow(rowUsers) {
      // ループのために3倍に複製（十分な幅を確保）
      return [...rowUsers, ...rowUsers, ...rowUsers].map(buildChip).join('');
    }

    document.getElementById('sliderRow1').innerHTML = makeRow(row1Users);
    document.getElementById('sliderRow2').innerHTML = makeRow(row2Users);
  }

  (async function initSlider() {
    try {
      const res = await fetch('/api/recent-users');
      const apiUsers = await res.json();
      if (Array.isArray(apiUsers) && apiUsers.length >= 4) {
        fillSlider(apiUsers);
      } else {
        fillSlider([...apiUsers, ...demoUsers]);
      }
    } catch {
      fillSlider(demoUsers);
    }
  })();
